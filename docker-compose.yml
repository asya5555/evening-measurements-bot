services:
  app:
    build: .
    env_file: .env
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.api.app:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    volumes:
      - ./media:/app/media
      - ./exports:/app/exports
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: diary
      POSTGRES_PASSWORD: diary
      POSTGRES_DB: diary
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U diary -d diary"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:

